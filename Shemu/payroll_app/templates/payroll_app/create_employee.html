{% extends 'payroll_app/base.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    
    <div class="card p-4 shadow" style="width: 400px;">
        
        <!-- Message -->
        {% if message %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endif %}

        <!-- Header -->
        <h3 class="text-center mb-4">Create Employee</h3>

        <!-- Form -->
        <form method="POST" action="{% url 'create_employee' %}">{% csrf_token %}

            <!-- Name -->
             <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">ID Number</label>
                <input type="text" name="id_number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Rate</label>
                <input type="number" step="0.01" name="rate" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Allowance (Optional)</label>
                <input type="number" step="0.01" name="allowance" class="form-control">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success">Create Employee</button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
