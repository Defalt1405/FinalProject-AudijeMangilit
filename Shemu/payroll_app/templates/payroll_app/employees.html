{% extends 'payroll_app/base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Employees</h2>
    <a href="{% url 'create_employee' %}" class="btn btn-success">+ Add Employee</a>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th class="table-dark" scope="col"> Name </th>
            <th class="table-dark" scope="col"> ID Number </th>
            <th class="table-dark" scope="col"> Rate </th>
            <th class="table-dark" scope="col"> Allowance </th>
            <th class="table-dark" scope="col"> Overtime </th>
            <th class="table-dark" scope="col"> Options </th>
        </tr>
    </thead>
    <tbody>
        {% for e in emp %}
        <tr>
            <td>{{ e.name }}</td>
            <td>{{ e.id_number }}</td>
            <td>{{ e.rate }}</td>
            <td>{{ e.allowance }}</td>
            <td>{{ e.overtime_pay }}</td>
            <td>
            <!-- top buttons -->
            <div class="d-flex gap-2 mb-2">
                <a href="{% url 'update_employee' pk=e.pk %}" class="btn btn-sm btn-warning w-50">Update</a>
                <a href="{% url 'delete_employee' pk=e.pk %}" class="btn btn-sm btn-danger w-50">Delete</a>
            </div>

            <!-- overtime form -->
            <form method="POST" action="{% url 'add_overtime' e.pk %}">{% csrf_token %}
                <div class="d-flex gap-2">
                    <input type="number" name="overtime_hours" class="form-control form-control-sm" placeholder="Overtime hours" required>
                    <button type="submit" class="btn btn-sm btn-primary">Add</button>
                </div>
            </form>
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>


{% endblock %}
